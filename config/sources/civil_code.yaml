# ============================================================
# Employee Help — Civil Code Source Configuration
# ============================================================
# California Civil Code — Divisions 1 & 3
# Div 1: Unruh Civil Rights Act (§§ 51-53)
# Div 3: Obligations/torts incl. sexual battery (§ 1708.5)
# Added as P2 statutory code (demand-driven expansion E.3).
# ============================================================

source:
  name: "Civil Code — Employment Rights"
  slug: civil_code
  source_type: statutory_code
  base_url: "https://leginfo.legislature.ca.gov"
  enabled: true

crawl:
  seed_urls: []
  allowlist_patterns:
    - "leginfo\\.legislature\\.ca\\.gov"
  blocklist_patterns: []
  rate_limit_seconds: 10.0
  max_pages: 5000

extraction:
  content_selector: "#content_anchor"
  boilerplate_patterns: []
  content_category: statutory_code

chunking:
  strategy: section_boundary
  min_tokens: 50
  max_tokens: 2000
  overlap_tokens: 0

statutory:
  code_abbreviation: CIV
  code_name: "Civil Code"
  citation_prefix: "Cal. Civ. Code"
  # Div 1: Persons — Unruh Act (§§ 51-53)
  # Div 3: Obligations — torts incl. sexual battery (§ 1708.5)
  target_divisions: ["1.", "3."]
  method: pubinfo

refresh:
  max_age_days: 7
  cron_hint: "0 3 * * 0"  # Weekly Sunday 3am UTC

database_path: "data/employee_help.db"
