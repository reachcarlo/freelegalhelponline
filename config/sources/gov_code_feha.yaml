# ============================================================
# Employee Help — Government Code (FEHA) Source Configuration
# ============================================================
# California Government Code — FEHA and Whistleblower sections
# (leginfo.legislature.ca.gov)
# ============================================================

source:
  name: "Government Code — FEHA & Whistleblower"
  slug: gov_code_feha
  source_type: statutory_code
  base_url: "https://leginfo.legislature.ca.gov"
  enabled: true

crawl:
  seed_urls: []  # Statutory sources use the StatutoryExtractor, not the web crawler
  allowlist_patterns:
    - "leginfo\\.legislature\\.ca\\.gov"
  blocklist_patterns: []
  rate_limit_seconds: 10.0
  max_pages: 5000

extraction:
  content_selector: "#content_anchor"
  boilerplate_patterns: []
  content_category: statutory_code

chunking:
  strategy: section_boundary
  min_tokens: 50
  max_tokens: 2000
  overlap_tokens: 0

# Statutory-specific configuration
statutory:
  code_abbreviation: GOV
  code_name: "Government Code"
  citation_prefix: "Cal. Gov. Code"
  # FEHA: Division 3, Part 2.8 (§§ 12900-12996)
  # Whistleblower: Division 2, Title 2, Part 1, Chapter 9.1 (§§ 8547+)
  # Note: target_sections used for partial-code extraction
  target_divisions: ["3."]
  method: pubinfo

refresh:
  max_age_days: 7
  cron_hint: "0 3 * * 0"  # Weekly Sunday 3am UTC

database_path: "data/employee_help.db"
