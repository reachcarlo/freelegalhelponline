  max_pages: 1

extraction:
  content_selector: ""
  boilerplate_patterns: []
  content_category: enforcement_manual

chunking:
  strategy: section_boundary
  min_tokens: 50
  max_tokens: 1500
  overlap_tokens: 100

statutory:
  code_abbreviation: DLSE-Manual
  code_name: "DLSE Enforcement Manual"
  citation_prefix: "DLSE Enforcement Manual"
  target_divisions: []
  method: dlse_manual

refresh:
  max_age_days: 180
  cron_hint: "0 3 1 1,7 *"  # Biannual Jan/Jul 1st 3am UTC
  check_update_url: "https://www.dir.ca.gov/dlse/DLSEManual/dlse_enfcmanual.pdf"

database_path: "data/employee_help.db"
