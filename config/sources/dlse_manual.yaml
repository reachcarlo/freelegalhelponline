  slug: dlse_manual
  source_type: statutory_code
  base_url: "https://www.dir.ca.gov/dlse/DLSEManual/dlse_enfcmanual.pdf"
  enabled: true

crawl:
  seed_urls: []
  allowlist_patterns:
    - "dir\\.ca\\.gov"
  blocklist_patterns: []
