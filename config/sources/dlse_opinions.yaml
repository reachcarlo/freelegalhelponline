# ============================================================
# Employee Help — DLSE Opinion Letters Source Configuration
# ============================================================
# DLSE (Division of Labor Standards Enforcement) opinion letters
# are interpretive guidance from the CA Labor Commissioner (1983–2019).
# Included in both consumer and attorney modes.
# ============================================================

source:
  name: "DLSE Opinion Letters"
  slug: dlse_opinions
  source_type: statutory_code
  base_url: "https://www.dir.ca.gov/dlse/opinionletters-bysubject.htm"
  enabled: true

crawl:
  seed_urls: []
  allowlist_patterns:
    - "dir\\.ca\\.gov"
  blocklist_patterns: []
  rate_limit_seconds: 2.0
  max_pages: 1

extraction:
  content_selector: ""
  boilerplate_patterns: []
  content_category: opinion_letter

chunking:
  strategy: section_boundary
  min_tokens: 50
  max_tokens: 1500
  overlap_tokens: 100

statutory:
  code_abbreviation: DLSE
  code_name: "DLSE Opinion Letters"
  citation_prefix: "DLSE Opinion Letter"
  target_divisions: []
  method: dlse_opinions

refresh:
  max_age_days: 365
  static: true

database_path: "data/employee_help.db"
