# Litigation Posture Configuration
# Platform-level setting used by attorney-facing tools (objection drafter,
# motion drafter, etc.) to control how aggressively the tool objects/argues.
#
# Each tool interprets these postures through its own Jinja2 prompt template.
# This file provides shared display metadata (labels, descriptions, tooltips).

postures:
  - id: aggressive
    label: Aggressive
    description: >-
      Zealous advocacy — object to nearly every request to preserve all
      grounds. Raises every objection with a colorable legal basis, including
      form objections, boilerplate grounds, and low-strength objections.
      The attorney reviews the output and removes what doesn't fit the
      case strategy.
    tooltip: >-
      Standard defense practice for most litigation. Objects to nearly every
      request to preserve all grounds — a waived objection can never be raised
      at trial. Expect 3-8 objections per request. The attorney reviews and
      trims the output. Recommended as the default.

  - id: balanced
    label: Balanced
    description: >-
      Competent advocacy — raise genuine objections while maintaining a
      professional, credible tone. Includes substantive objections when
      warranted and form objections when the defect is meaningful.
      Low-strength objections only for privilege-sensitive grounds.
    tooltip: >-
      Appropriate when you want a clean set of substantive objections without
      extensive form objections. Expect 1-4 objections per request. Good for
      cases where you want to project professionalism while still protecting
      your client's interests.

  - id: selective
    label: Selective
    description: >-
      Strategic restraint — object only when clearly warranted. Omits
      boilerplate and marginal objections. Produces a lean response
      focused on objections a court would almost certainly sustain or
      that preserve critical privileges.
    tooltip: >-
      Use for cooperative discovery relationships, court-ordered good-faith
      responses, or when projecting maximum credibility. Most requests will
      have zero or one objection. Only high-strength and privilege objections
      are included.
