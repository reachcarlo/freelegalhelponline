name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Staging deployment placeholder — configure with your hosting provider"
        # TODO: Replace with actual deployment steps (e.g., fly deploy, vercel, railway)

  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      # Manual approval gate — configure required reviewers in GitHub repo settings:
      # Settings > Environments > production > Required reviewers
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Production deployment placeholder — configure with your hosting provider"
        # TODO: Replace with actual deployment steps

      - name: Verify deployment
        run: echo "Health check placeholder"
        # TODO: curl health endpoint after deploy
